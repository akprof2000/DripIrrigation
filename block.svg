<svg viewBox="0 0 1280 1060" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#546E7A"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="1060" fill="#FFFFFF"/>
  <text x="40" y="48" font-size="26" font-weight="bold" fill="#263238">Алгоритм работы системы</text>

  <!-- ================= ЛЕВАЯ ПАНЕЛЬ: основной цикл ================= -->
  <rect x="50" y="80" width="620" height="900" rx="14" fill="#FAFBFC" stroke="#E0E4E8" stroke-width="1.5"/>
  <text x="360" y="112" text-anchor="middle" font-size="17" font-weight="bold" fill="#37474F">Основной цикл — раз в минуту</text>

  <!-- стрелки -->
  <g stroke="#546E7A" stroke-width="2" fill="none" marker-end="url(#arr)">
    <line x1="280" y1="182" x2="280" y2="212"/>
    <line x1="280" y1="268" x2="280" y2="298"/>
    <line x1="280" y1="342" x2="280" y2="372"/>
    <line x1="280" y1="470" x2="280" y2="518"/>
    <line x1="280" y1="562" x2="280" y2="593"/>
    <!-- нет: вправо к принудительному закрытию -->
    <polyline points="410,420 565,420 565,498"/>
    <polyline points="565,570 565,802 452,802"/>
    <!-- авто: три исхода -->
    <polyline points="130,640 96,640 96,700"/>
    <polyline points="430,640 464,640 464,700"/>
    <line x1="280" y1="685" x2="280" y2="778"/>
    <!-- слияние к CSV -->
    <polyline points="96,744 96,802 108,802"/>
    <polyline points="464,744 464,762 430,762 430,778"/>
    <line x1="280" y1="824" x2="280" y2="852"/>
  </g>
  <!-- возврат к началу (пунктир) -->
  <polyline points="280,898 280,940 72,940 72,160 178,160" stroke="#B0BEC5" stroke-width="2" fill="none" stroke-dasharray="7 5" marker-end="url(#arr)"/>

  <!-- подписи ветвей -->
  <g font-size="12" font-weight="bold">
    <text x="290" y="500" fill="#2E7D32">да</text>
    <text x="425" y="410" fill="#C62828">нет</text>
    <text x="120" y="628" fill="#1565C0">ниже порога −Δ</text>
    <text x="352" y="628" fill="#C62828">выше порога +Δ</text>
    <text x="290" y="730" fill="#78909C" font-weight="normal">в зоне Δ — без изменений</text>
  </g>

  <!-- 1. старт -->
  <rect x="178" y="138" width="204" height="44" rx="22" fill="#37474F"/>
  <text x="280" y="166" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">Прошла минута</text>

  <!-- 2. опрос датчиков -->
  <rect x="110" y="212" width="340" height="56" rx="8" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="280" y="236" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#2E7D32">Опрос 8 датчиков влажности</text>
  <text x="280" y="256" text-anchor="middle" font-size="11.5" fill="#689F38">медиана из 9 замеров АЦП на канал</text>

  <!-- 3. погода -->
  <rect x="110" y="298" width="340" height="44" rx="8" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="280" y="325" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#1565C0">Оценка погоды: день / ночь · дождь</text>

  <!-- 4. ромб: полив разрешён -->
  <polygon points="280,372 410,420 280,470 150,420" fill="#FFF8E1" stroke="#FFB300" stroke-width="1.5"/>
  <text x="280" y="415" text-anchor="middle" font-size="13" font-weight="bold" fill="#F57F17">Полив разрешён?</text>
  <text x="280" y="433" text-anchor="middle" font-size="10.5" fill="#F9A825">настройки «ночью» / «в дождь»</text>

  <!-- нет: принудительное закрытие -->
  <rect x="480" y="498" width="170" height="72" rx="8" fill="#FFEBEE" stroke="#E57373" stroke-width="1.5"/>
  <text x="565" y="520" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#C62828">Закрыть клапаны</text>
  <text x="565" y="537" text-anchor="middle" font-size="10.5" fill="#D32F2F">кроме «всегда ВКЛ»</text>
  <text x="565" y="552" text-anchor="middle" font-size="10.5" fill="#D32F2F">и парников при дожде</text>

  <!-- 5. каждый канал -->
  <rect x="110" y="518" width="340" height="44" rx="8" fill="#EDE7F6" stroke="#9575CD" stroke-width="1.5"/>
  <text x="280" y="545" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#5E35B1">Каждый канал 1–8: режим клапана</text>

  <!-- 6. ромб: авто-режим -->
  <polygon points="280,593 430,640 280,687 130,640" fill="#FFF8E1" stroke="#FFB300" stroke-width="1.5"/>
  <text x="280" y="633" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#F57F17">АВТО / ПАРНИК:</text>
  <text x="280" y="651" text-anchor="middle" font-size="12" fill="#F57F17">влажность отн. порога ± Δ</text>

  <!-- открыть / закрыть -->
  <rect x="40" y="700" width="112" height="44" rx="8" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="96" y="727" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#2E7D32">Открыть клапан</text>
  <rect x="408" y="700" width="112" height="44" rx="8" fill="#FFEBEE" stroke="#E57373" stroke-width="1.5"/>
  <text x="464" y="727" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#C62828">Закрыть клапан</text>

  <!-- 7. CSV -->
  <rect x="110" y="778" width="340" height="46" rx="8" fill="#F3E5F5" stroke="#AB47BC" stroke-width="1.5"/>
  <text x="280" y="806" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#6A1B9A">Запись показаний в CSV на SD-карту</text>

  <!-- 8. Telegram -->
  <rect x="110" y="852" width="340" height="46" rx="8" fill="#E0F2F1" stroke="#26A69A" stroke-width="1.5"/>
  <text x="280" y="880" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#00695C">Уведомления в Telegram (события)</text>

  <!-- ================= ПРАВАЯ ПАНЕЛЬ: фоновые задачи ================= -->
  <rect x="700" y="80" width="540" height="900" rx="14" fill="#FAFBFC" stroke="#E0E4E8" stroke-width="1.5"/>
  <text x="970" y="112" text-anchor="middle" font-size="17" font-weight="bold" fill="#37474F">Фоновые задачи — каждый цикл loop()</text>

  <!-- карточка-шаблон: цветная полоса слева -->
  <g>
    <rect x="724" y="140" width="492" height="86" rx="8" fill="#FFFFFF" stroke="#E0E4E8" stroke-width="1.5"/>
    <rect x="724" y="140" width="6" height="86" rx="3" fill="#26A69A"/>
    <text x="748" y="168" font-size="14" font-weight="bold" fill="#37474F">Telegram-бот (FastBot2)</text>
    <text x="748" y="190" font-size="11.5" fill="#607D8B">команды и меню · до 8 пользователей с ролями</text>
    <text x="748" y="208" font-size="11.5" fill="#607D8B">OTA-обновление прошивки по файлу в чате</text>
  </g>
  <g>
    <rect x="724" y="244" width="492" height="86" rx="8" fill="#FFFFFF" stroke="#E0E4E8" stroke-width="1.5"/>
    <rect x="724" y="244" width="6" height="86" rx="3" fill="#F57F17"/>
    <text x="748" y="272" font-size="14" font-weight="bold" fill="#37474F">Нагнетательный насос</text>
    <text x="748" y="294" font-size="11.5" fill="#607D8B">пусковой режим — минимум 30 с при открытии клапана;</text>
    <text x="748" y="312" font-size="11.5" fill="#607D8B">далее держится, пока открыто ≥ N клапанов (настройка)</text>
  </g>
  <g>
    <rect x="724" y="348" width="492" height="86" rx="8" fill="#FFFFFF" stroke="#E0E4E8" stroke-width="1.5"/>
    <rect x="724" y="348" width="6" height="86" rx="3" fill="#00838F"/>
    <text x="748" y="376" font-size="14" font-weight="bold" fill="#37474F">Датчик потока — учёт расхода воды</text>
    <text x="748" y="398" font-size="11.5" fill="#607D8B">литры за текущую сессию полива и накопленный итог,</text>
    <text x="748" y="416" font-size="11.5" fill="#607D8B">текущая скорость потока в статусе</text>
  </g>
  <g>
    <rect x="724" y="452" width="492" height="86" rx="8" fill="#FFFFFF" stroke="#E0E4E8" stroke-width="1.5"/>
    <rect x="724" y="452" width="6" height="86" rx="3" fill="#5E35B1"/>
    <text x="748" y="480" font-size="14" font-weight="bold" fill="#37474F">Контроль засора фильтра</text>
    <text x="748" y="502" font-size="11.5" fill="#607D8B">после стабилизации потока — сравнение с эталоном чистого</text>
    <text x="748" y="520" font-size="11.5" fill="#607D8B">фильтра; тревога в Telegram при падении ниже порога %</text>
  </g>
  <g>
    <rect x="724" y="556" width="492" height="86" rx="8" fill="#FFFFFF" stroke="#E0E4E8" stroke-width="1.5"/>
    <rect x="724" y="556" width="6" height="86" rx="3" fill="#C62828"/>
    <text x="748" y="584" font-size="14" font-weight="bold" fill="#37474F">Пролив дренажа</text>
    <text x="748" y="606" font-size="11.5" fill="#607D8B">12 с при первом поливе после простоя дольше 5 часов —</text>
    <text x="748" y="624" font-size="11.5" fill="#607D8B">сброс ржавчины, защита форсунок от засора</text>
  </g>
  <g>
    <rect x="724" y="660" width="492" height="86" rx="8" fill="#FFFFFF" stroke="#E0E4E8" stroke-width="1.5"/>
    <rect x="724" y="660" width="6" height="86" rx="3" fill="#1565C0"/>
    <text x="748" y="688" font-size="14" font-weight="bold" fill="#37474F">Заливка бака</text>
    <text x="748" y="710" font-size="11.5" fill="#607D8B">при наступлении ночи (режим энергосбережения) —</text>
    <text x="748" y="728" font-size="11.5" fill="#607D8B">вода прогревается к утреннему поливу</text>
  </g>
  <g>
    <rect x="724" y="764" width="492" height="86" rx="8" fill="#FFFFFF" stroke="#E0E4E8" stroke-width="1.5"/>
    <rect x="724" y="764" width="6" height="86" rx="3" fill="#42A5F5"/>
    <text x="748" y="792" font-size="14" font-weight="bold" fill="#37474F">Контроль связи</text>
    <text x="748" y="814" font-size="11.5" fill="#607D8B">автопереподключение Wi-Fi · детект потери связи</text>
    <text x="748" y="832" font-size="11.5" fill="#607D8B">с Telegram и уведомление о восстановлении</text>
  </g>
  <g>
    <rect x="724" y="868" width="492" height="86" rx="8" fill="#FFFFFF" stroke="#E0E4E8" stroke-width="1.5"/>
    <rect x="724" y="868" width="6" height="86" rx="3" fill="#8D6E63"/>
    <text x="748" y="896" font-size="14" font-weight="bold" fill="#37474F">Хранение настроек</text>
    <text x="748" y="918" font-size="11.5" fill="#607D8B">отложенное сохранение конфигурации на SD-карту ·</text>
    <text x="748" y="936" font-size="11.5" fill="#607D8B">авто-сброс к заводским при смене версии конфига</text>
  </g>
</svg>
