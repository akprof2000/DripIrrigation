<svg viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="360" fill="#FFFFFF"/>
  <text x="30" y="34" font-size="19" font-weight="bold" fill="#263238">Насос повышения давления — пример работы (порог N = 2)</text>

  <!-- вертикальные метки событий -->
  <g stroke="#B0BEC5" stroke-width="1" stroke-dasharray="4 4">
    <line x1="120" y1="80" x2="120" y2="245"/>
    <line x1="270" y1="190" x2="270" y2="245"/>
    <line x1="420" y1="130" x2="420" y2="245"/>
    <line x1="570" y1="190" x2="570" y2="245"/>
    <line x1="700" y1="130" x2="700" y2="245"/>
  </g>

  <!-- дорожка: клапан 1 -->
  <text x="108" y="102" text-anchor="end" font-size="13" font-weight="bold" fill="#455A64">Клапан 1</text>
  <rect x="120" y="85" width="740" height="26" rx="5" fill="#A5D6A7" stroke="#81C784"/>
  <text x="490" y="103" text-anchor="middle" font-size="12" fill="#1B5E20">открыт</text>

  <!-- дорожка: клапан 2 -->
  <text x="108" y="152" text-anchor="end" font-size="13" font-weight="bold" fill="#455A64">Клапан 2</text>
  <rect x="420" y="135" width="280" height="26" rx="5" fill="#A5D6A7" stroke="#81C784"/>
  <text x="560" y="153" text-anchor="middle" font-size="12" fill="#1B5E20">открыт</text>

  <!-- дорожка: насос -->
  <text x="108" y="222" text-anchor="end" font-size="13" font-weight="bold" fill="#455A64">Насос</text>
  <rect x="120" y="200" width="150" height="34" rx="5" fill="#FFCA28" stroke="#FFB300"/>
  <text x="195" y="222" text-anchor="middle" font-size="12" font-weight="bold" fill="#795548">пусковой · 30 с</text>
  <rect x="420" y="200" width="150" height="34" rx="5" fill="#FFCA28" stroke="#FFB300"/>
  <text x="495" y="222" text-anchor="middle" font-size="12" font-weight="bold" fill="#795548">пусковой · 30 с</text>
  <rect x="570" y="200" width="130" height="34" rx="5" fill="#F57F17" stroke="#E65100"/>
  <text x="635" y="222" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">удержание</text>

  <!-- ось времени -->
  <line x1="120" y1="245" x2="860" y2="245" stroke="#B0BEC5" stroke-width="1.5"/>
  <text x="860" y="262" text-anchor="end" font-size="12" fill="#78909C">время →</text>

  <!-- пояснения -->
  <g font-size="12" fill="#546E7A">
    <text x="125" y="285">① клапан открылся —</text>
    <text x="125" y="301">насос минимум на 30 с</text>
    <text x="278" y="285">② открыт 1 клапан (1 &lt; 2) —</text>
    <text x="278" y="301">насос выключился</text>
    <text x="430" y="330">③ открылось 2 клапана (2 ≥ 2) — после пусковых 30 с</text>
    <text x="430" y="346">насос продолжает работать, пока открыто ≥ N клапанов</text>
    <text x="705" y="285">④ клапан 2 закрылся (1 &lt; 2) —</text>
    <text x="705" y="301">насос выключился</text>
  </g>
</svg>
