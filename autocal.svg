<svg viewBox="0 0 900 490" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="490" fill="#FFFFFF"/>
  <text x="30" y="34" font-size="19" font-weight="bold" fill="#263238">Авто-калибровка границ — почва стала суше калибровочного «сухого»</text>

  <!-- зона за старой границей -->
  <rect x="90" y="70" width="770" height="140" fill="#FFEBEE" opacity="0.5"/>
  <text x="852" y="88" text-anchor="end" font-size="11.5" font-weight="bold" fill="#C62828">за границей калибровки — проценты упираются в 0 %</text>

  <!-- оси -->
  <line x1="90" y1="60" x2="90" y2="330" stroke="#B0BEC5" stroke-width="1.5"/>
  <line x1="90" y1="330" x2="860" y2="330" stroke="#B0BEC5" stroke-width="1.5"/>
  <text x="26" y="200" font-size="12" fill="#78909C" transform="rotate(-90 26 200)">АЦП (суше →)</text>
  <text x="860" y="347" text-anchor="end" font-size="12" fill="#78909C">замеры раз в минуту →</text>

  <!-- старая граница -->
  <line x1="90" y1="210" x2="540" y2="210" stroke="#C62828" stroke-width="2"/>
  <line x1="540" y1="210" x2="860" y2="210" stroke="#C62828" stroke-width="1.5" stroke-dasharray="5 5" opacity="0.4"/>
  <text x="98" y="230" font-size="12" font-weight="bold" fill="#C62828">граница «сухо» (калибровка)</text>

  <!-- новая граница -->
  <line x1="540" y1="140" x2="860" y2="140" stroke="#E53935" stroke-width="2.5" stroke-dasharray="8 4"/>
  <text x="852" y="132" text-anchor="end" font-size="12" font-weight="bold" fill="#E53935">новая граница = значение + дельта</text>

  <!-- дельта: двойная стрелка -->
  <line x1="566" y1="200" x2="566" y2="140" stroke="#7B1FA2" stroke-width="1.5"/>
  <polygon points="566,140 562,148 570,148" fill="#7B1FA2"/>
  <polygon points="566,200 562,192 570,192" fill="#7B1FA2"/>
  <text x="576" y="164" font-size="11.5" font-weight="bold" fill="#7B1FA2">дельта</text>
  <text x="576" y="178" font-size="11.5" font-weight="bold" fill="#7B1FA2">калибровки</text>

  <!-- «самое мягкое из трёх» — вынесено вверх, с выноской -->
  <text x="420" y="112" text-anchor="end" font-size="11" fill="#7B1FA2">за границу берём самое мягкое</text>
  <text x="420" y="126" text-anchor="end" font-size="11" fill="#7B1FA2">из трёх подтверждающих замеров —</text>
  <text x="420" y="140" text-anchor="end" font-size="11" fill="#7B1FA2">чтобы выброс внутри окна</text>
  <text x="420" y="154" text-anchor="end" font-size="11" fill="#7B1FA2">не утянул границу слишком далеко</text>
  <polyline points="424,158 436,180 440,194" fill="none" stroke="#7B1FA2" stroke-width="1.2" stroke-dasharray="3 3"/>
  <line x1="440" y1="200" x2="566" y2="200" stroke="#7B1FA2" stroke-width="1.2" stroke-dasharray="4 3"/>

  <!-- кривая показаний -->
  <polyline points="140,250 190,245 240,175 290,248 340,240 390,235 440,200 490,190 540,195 590,185 640,180 690,178 740,182 790,186"
            fill="none" stroke="#2E7D32" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- точки замеров -->
  <g fill="#2E7D32">
    <circle cx="140" cy="250" r="4"/><circle cx="190" cy="245" r="4"/>
    <circle cx="290" cy="248" r="4"/><circle cx="340" cy="240" r="4"/><circle cx="390" cy="235" r="4"/>
    <circle cx="590" cy="185" r="4"/><circle cx="640" cy="180" r="4"/><circle cx="690" cy="178" r="4"/>
    <circle cx="740" cy="182" r="4"/><circle cx="790" cy="186" r="4"/>
  </g>
  <circle cx="240" cy="175" r="6.5" fill="#E53935" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="440" cy="200" r="6" fill="#FB8C00" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="490" cy="190" r="6" fill="#FB8C00" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="540" cy="195" r="7" fill="#43A047" stroke="#FFFFFF" stroke-width="2"/>

  <!-- строка счётчика -->
  <text x="90" y="354" font-size="11.5" font-weight="bold" fill="#455A64">счётчик замеров подряд за границей:</text>
  <g font-size="12.5" text-anchor="middle">
    <text x="140" y="376" fill="#90A4AE">0</text>
    <text x="190" y="376" fill="#90A4AE">0</text>
    <text x="240" y="376" fill="#E53935" font-weight="bold">1</text>
    <text x="290" y="376" fill="#E53935" font-weight="bold">0</text>
    <text x="340" y="376" fill="#90A4AE">0</text>
    <text x="390" y="376" fill="#90A4AE">0</text>
    <text x="440" y="376" fill="#FB8C00" font-weight="bold">1</text>
    <text x="490" y="376" fill="#FB8C00" font-weight="bold">2</text>
    <text x="540" y="376" fill="#2E7D32" font-weight="bold">3 ✓</text>
    <text x="590" y="376" fill="#90A4AE">0</text>
    <text x="640" y="376" fill="#90A4AE">0</text>
    <text x="690" y="376" fill="#90A4AE">0</text>
    <text x="740" y="376" fill="#90A4AE">0</text>
    <text x="790" y="376" fill="#90A4AE">0</text>
  </g>

  <!-- аннотации событий -->
  <line x1="240" y1="382" x2="240" y2="398" stroke="#E53935" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="245" y="414" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#C62828">разовый выброс АЦП</text>
  <text x="245" y="429" text-anchor="middle" font-size="11.5" fill="#C62828">следующий замер в норме → счётчик обнулён,</text>
  <text x="245" y="443" text-anchor="middle" font-size="11.5" fill="#C62828">граница не тронута</text>

  <line x1="540" y1="382" x2="540" y2="398" stroke="#2E7D32" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="640" y="414" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#2E7D32">3 замера подряд за границей (3 мин)</text>
  <text x="640" y="429" text-anchor="middle" font-size="11.5" fill="#2E7D32">граница сдвинута и сохранена на SD —</text>
  <text x="640" y="443" text-anchor="middle" font-size="11.5" fill="#2E7D32">шкала снова показывает реальные проценты</text>

  <!-- сноска -->
  <text x="90" y="468" font-size="11" fill="#90A4AE">Границы только расширяются. Симметрично работает нижняя граница («вода»), если почва окажется влажнее калибровочного замера.</text>
  <text x="90" y="482" font-size="11" fill="#90A4AE">Во время диалогов калибровки и поиска датчика функция отключена. Подтверждение снимается настройкой «Авто-калибровка без задержки».</text>
</svg>
